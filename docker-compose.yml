services:
  postgres:
    image: pgvector/pgvector:pg16
    command: -p 5433
    environment:
      POSTGRES_DB: ${DB_NAME:-medassist}
      POSTGRES_USER: ${DB_USER:-medassist}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medassist}
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medassist} -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - medtech

  app:
    build: .
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - medtech
    volumes:
      - ./data:/app/data:ro

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - medtech

networks:
  medtech:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
